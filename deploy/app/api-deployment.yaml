apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/adiom-data/sample-app-api:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AUTH_ISSUER
              value: http://sample-api/auth
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: sample-app-auth
                  key: OIDC_ISSUER
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sample-app-auth
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sample-app-auth
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_ALLOWED_AUDIENCES
              valueFrom:
                secretKeyRef:
                  name: sample-app-auth
                  key: OIDC_ALLOWED_AUDIENCES
                  optional: true
            - name: AUTH_PRIVATE_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: sample-app-auth
                  key: AUTH_PRIVATE_KEY_BASE64
            - name: AUTH_STATE_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: sample-app-auth
                  key: AUTH_STATE_KEY_BASE64
            - name: PGHOST
              value: sample-postgres-rw
            - name: PGDATABASE
              value: app
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: sample-postgres-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: sample-postgres-app
                  key: password
            - name: OTEL_SERVICE_NAME
              value: sample-api
          readinessProbe:
            grpc:
              port: 8080
              service: readiness
          livenessProbe:
            grpc:
              port: 8080
              service: liveness
          startupProbe:
            grpc:
              port: 8080
              service: liveness
            failureThreshold: 30
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
