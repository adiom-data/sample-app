apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-gateway
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/adiom-data/sample-app-gateway:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            grpc:
              port: 8080
              service: readiness
          livenessProbe:
            grpc:
              port: 8080
              service: liveness
          startupProbe:
            grpc:
              port: 8080
              service: liveness
            failureThreshold: 30
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
