apiVersion: batch/v1
kind: Job
metadata:
  name: sample-app-db-setup
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app-db-setup
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-app-db
          image: postgres:18
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              deadline="$(($(date +%s) + ${DB_SETUP_WAIT_SECONDS:-900}))"
              until psql -v ON_ERROR_STOP=1 -Atqc "select 1" >/dev/null 2>&1; do
                if [ "$(date +%s)" -ge "$deadline" ]; then
                  echo "timed out waiting for postgres"
                  exit 1
                fi
                echo "waiting for postgres"
                sleep 2
              done

              exists="$(
                psql -v ON_ERROR_STOP=1 -v db="$APP_DATABASE" -At <<'SQL'
              select 1 from pg_database where datname = :'db';
              SQL
              )"
              if [ "$exists" = "1" ]; then
                echo "database ${APP_DATABASE} already exists"
                exit 0
              fi

              psql -v ON_ERROR_STOP=1 -v db="$APP_DATABASE" -v owner="$APP_DATABASE_OWNER" <<'SQL'
              create database :"db" owner :"owner";
              SQL
          env:
            - name: PGHOST
              value: sample-postgres-rw
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: postgres
            - name: DB_SETUP_WAIT_SECONDS
              value: "900"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: sample-postgres-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: sample-postgres-superuser
                  key: password
            - name: APP_DATABASE
              value: app
            - name: APP_DATABASE_OWNER
              valueFrom:
                secretKeyRef:
                  name: sample-postgres-app
                  key: username
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
